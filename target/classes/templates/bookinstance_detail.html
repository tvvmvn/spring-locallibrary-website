
<div th:replace="~{fragments/header :: header}"></div>

<h2 th:text="${bookInstance.book.title}"></h2>

<p>
  Imprint:
  <span th:text="${bookInstance.imprint}"></span>
</p>

<p>
  Status: 
  <span th:text="${bookInstance.status.getLabel()}"></span>
</p>

<p>
  Due Back: 
  <span th:text="${#temporals.format(bookInstance.dueBack, 'yyyy.MM.dd')}"></span>
</p>

<p>
  <a href="/bookinstances">list</a>
  <a th:href="${bookInstance.url + '/update'}">update</a>
  <a th:href="${bookInstance.url + '/delete'}">delete</a>
</p>

<div th:replace="~{fragments/footer :: footer}"></div>
